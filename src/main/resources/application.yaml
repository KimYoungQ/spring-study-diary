# 서버 설정
server:
  port: 8081
  servlet:
    context-path:

spring:
  application:
    name: my-spring-study-diary
  profiles:
    active: dev

  # Validation
  messages:
    basename: messages/validation
    encoding: UTF-8

# 로깅 설정
logging:
  level:
    root: INFO
    com.study.myspringstudydiary: DEBUG
    org.springframework.jdbc: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] [%X{requestId}] [%X{userId:-anonymous}] %-5level %logger{36} - %msg%n"

# JWT 설정 (공통)
jwt:
  secret: ${JWT_SECRET:myVerySecretKeyForJwtTokenGenerationAndValidation123456789012345678901234567890}
  access-token-validity: 1800  # 30 minutes in seconds
  refresh-token-validity: 604800  # 7 days in seconds

springdoc:
  # Swagger UI 경로 설정
  swagger-ui:
    path: /swagger-ui.html
    # API 목록을 그룹별로 표시
    groups-order: DESC
    # 태그를 알파벳 순으로 정렬
    tags-sorter: alpha
    # 오퍼레이션을 HTTP 메서드 순으로 정렬
    operations-sorter: method
    # Try it out 기능 기본 활성화
    disable-swagger-default-url: true
    # 요청 소요 시간 표시
    display-request-duration: true

  # OpenAPI 문서 경로
  api-docs:
    path: /v3/api-docs
    enabled: true

  # 패키지 경로 스캔 설정
  packages-to-scan: com.study.my_spring_study_diary

  # 기본 스프링 액추에이터 응답 제외
  show-actuator: false
