# 서버 설정
server:
  port: ${APP_PORT:8081}
  servlet:
    context-path:

spring:
  application:
    name: my-spring-study-diary

  # MySQL 데이터베이스 설정
  datasource:
    url: jdbc:mysql://localhost:3306/diary_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:rootpass}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 600000
      pool-name: StudyDiaryHikariCP

  # SQL 로깅 설정
  sql:
    init:
      mode: always
      platform: mysql
      encoding: UTF-8
#      schema-locations: classpath:db/schema.sql
#      data-locations: classpath:db/data.sql

  # Validation
  messages:
    basename: messages/validation
    encoding: UTF-8

# 로깅 설정
logging:
  level:
    root: INFO
    com.study.myspringstudydiary: DEBUG
    org.springframework.jdbc: DEBUG
    com.zaxxer.hikari: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] [%X{requestId}] [%X{userId:-anonymous}] %-5level %logger{36} - %msg%n"

# JWT 설정 (공통)
jwt:
  secret: ${JWT_SECRET:myVerySecretKeyForJwtTokenGenerationAndValidation123456789012345678901234567890}
  access-token-validity: 1800  # 30 minutes in seconds
  refresh-token-validity: 604800  # 7 days in seconds

springdoc:
  # Swagger UI 경로 설정
  swagger-ui:
    path: /swagger-ui.html
    # API 목록을 그룹별로 표시
    groups-order: DESC
    # 태그를 알파벳 순으로 정렬
    tags-sorter: alpha
    # 오퍼레이션을 HTTP 메서드 순으로 정렬
    operations-sorter: method
    # Try it out 기능 기본 활성화
    disable-swagger-default-url: true
    # 요청 소요 시간 표시
    display-request-duration: true

  # OpenAPI 문서 경로
  api-docs:
    path: /v3/api-docs
    enabled: true

  # 패키지 경로 스캔 설정
  packages-to-scan: com.study.my_spring_study_diary

  # 기본 스프링 액추에이터 응답 제외
  show-actuator: false

discord:
  webhook:
    # 환경변수로 관리 (보안)
    url: ${DISCORD_WEBHOOK_URL:https://discord.com/api/webhooks/1481275038643785912/a-lDft0Nq8u5B0_9P0HUECdfLkURj9VRR6-ZyRyx9zHTv1VroJZ9tbYOvELAP5lniCnR1}
    enabled: ${DISCORD_WEBHOOK_ENABLED:true}
    username: Study Log Bot
    avatar-url: https://i.imgur.com/AfFp7pu.png

resilience4j:
  circuitbreaker:
    instances:
      discordWebhook:
        # slidingWindowSize: 실패율 계산에 사용할 최근 호출 수
        sliding-window-size: 20
        # failureRateThreshold: 서킷을 OPEN으로 전환하는 실패율 (%)
        # 최근 10번 중 50%(5번) 이상 실패하면 서킷 OPEN
        failure-rate-threshold: 50
        # waitDurationInOpenState: OPEN 상태에서 HALF_OPEN으로 전환까지의 대기 시간
        wait-duration-in-open-state: 30s
        # permittedNumberOfCallsInHalfOpenState: HALF_OPEN에서 테스트할 요청 수
        permitted-number-of-calls-in-half-open-state: 3
        # minimumNumberOfCalls: 실패율 계산을 시작하기 위한 최소 호출 수
        minimum-number-of-calls: 10