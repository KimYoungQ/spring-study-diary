# Local 환경 - H2 인메모리 데이터베이스 설정
spring:
  datasource:
    url: jdbc:h2:mem:diary_db
    username: sa
    password:
    driver-class-name: org.h2.Driver

  # SQL 초기화 설정
  sql:
    init:
      mode: always
      encoding: UTF-8
      schema-locations: classpath:db/h2/schema.sql
      data-locations: classpath:db/h2/data.sql

  # H2 콘솔 설정
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        trace: false
        web-allow-others: false

logging:
  level:
    com.zaxxer.hikari: INFO
